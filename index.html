<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netty 文件上传下载</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #1d4ed8;
            --danger: #b91c1c;
            --border: #d1d5db;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 820px;
            margin: 36px auto;
            padding: 0 16px;
        }

        .title {
            margin-bottom: 16px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            margin-bottom: 24px;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            color: #374151;
            font-size: 14px;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            background: #fff;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: #f9fafb;
            border: 1px dashed var(--border);
            font-family: Consolas, Monaco, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            min-height: 44px;
        }

        .error {
            color: var(--danger);
        }

        progress {
            width: 100%;
            height: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">Netty 文件上传 / 下载</div>
    <div class="subtitle">后端地址固定为 <code>http://localhost:8080</code></div>

    <div class="card">
        <h2>上传文件</h2>
        <div class="row">
            <label for="uploadFile">选择文件</label>
            <input id="uploadFile" type="file">
        </div>
        <div class="row">
            <label for="uploadName">服务器文件名</label>
            <input id="uploadName" type="text" placeholder="例如 demo.bin">
        </div>
        <div class="actions">
            <button id="uploadBtn" type="button">开始上传</button>
        </div>
        <progress id="uploadProgress" value="0" max="100"></progress>
        <div class="hint">接口：POST /upload?filename=xxx，上传为原始二进制流。</div>
        <div id="uploadResult" class="result"></div>
    </div>

    <div class="card">
        <h2>下载文件</h2>
        <div class="row">
            <label for="downloadName">服务器文件名</label>
            <input id="downloadName" type="text" placeholder="例如 demo.bin">
        </div>
        <div class="actions">
            <button id="downloadBtn" type="button">下载文件</button>
        </div>
        <div class="hint">接口：GET /download?filename=xxx</div>
        <div id="downloadResult" class="result"></div>
    </div>
</div>

<script>
    (function () {
        "use strict";

        var API_BASE = "http://localhost:8080";

        var uploadFileEl = document.getElementById("uploadFile");
        var uploadNameEl = document.getElementById("uploadName");
        var uploadBtn = document.getElementById("uploadBtn");
        var uploadProgressEl = document.getElementById("uploadProgress");
        var uploadResultEl = document.getElementById("uploadResult");

        var downloadNameEl = document.getElementById("downloadName");
        var downloadBtn = document.getElementById("downloadBtn");
        var downloadResultEl = document.getElementById("downloadResult");

        function setResult(el, msg, isError) {
            el.textContent = msg;
            el.classList.toggle("error", !!isError);
        }

        function sanitizeName(name) {
            return (name || "").trim();
        }

        uploadFileEl.addEventListener("change", function () {
            if (!uploadNameEl.value && uploadFileEl.files && uploadFileEl.files.length > 0) {
                uploadNameEl.value = uploadFileEl.files[0].name;
            }
        });

        uploadBtn.addEventListener("click", function () {
            var file = uploadFileEl.files && uploadFileEl.files[0];
            var filename = sanitizeName(uploadNameEl.value);

            if (!file) {
                setResult(uploadResultEl, "请选择要上传的文件。", true);
                return;
            }
            if (!filename) {
                setResult(uploadResultEl, "请输入服务器文件名。", true);
                return;
            }

            uploadBtn.disabled = true;
            uploadProgressEl.value = 0;
            setResult(uploadResultEl, "上传中...", false);

            var url = API_BASE + "/upload?filename=" + encodeURIComponent(filename);
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-Type", "application/octet-stream");

            xhr.upload.onprogress = function (event) {
                if (event.lengthComputable) {
                    var percent = (event.loaded / event.total) * 100;
                    uploadProgressEl.value = percent;
                }
            };

            xhr.onload = function () {
                uploadBtn.disabled = false;
                uploadProgressEl.value = 100;

                var text = xhr.responseText || "";
                if (xhr.status >= 200 && xhr.status < 300) {
                    setResult(uploadResultEl, "上传成功\nHTTP " + xhr.status + "\n" + text, false);
                } else {
                    setResult(uploadResultEl, "上传失败\nHTTP " + xhr.status + "\n" + text, true);
                }
            };

            xhr.onerror = function () {
                uploadBtn.disabled = false;
                setResult(uploadResultEl, "上传失败：网络错误或跨域被拦截。", true);
            };

            xhr.onabort = function () {
                uploadBtn.disabled = false;
                setResult(uploadResultEl, "上传已取消。", true);
            };

            xhr.send(file);
        });

        downloadBtn.addEventListener("click", function () {
            var filename = sanitizeName(downloadNameEl.value);
            if (!filename) {
                setResult(downloadResultEl, "请输入要下载的文件名。", true);
                return;
            }

            var url = API_BASE + "/download?filename=" + encodeURIComponent(filename);
            var link = document.createElement("a");
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            setResult(downloadResultEl, "已发起下载请求：\n" + url, false);
        });
    })();
</script>
</body>
</html>
